<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phê duyệt — TTDCore</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --teal:#00BFA5;--teal2:#00897B;--blue:#1565C0;
  --dark:#04111f;--dark2:#071828;--dark3:#0a2235;
  --white:#fff;--muted:#7aafc0;--border:rgba(0,191,165,0.15);--border2:rgba(255,255,255,0.07);
  --amber:#f0a500;--red:#ef5350;--green:#00BFA5;--purple:#ab47bc;
}
body{font-family:'Open Sans',sans-serif;background:var(--dark);color:var(--white);min-height:100vh;}
header{background:var(--dark2);border-bottom:2px solid var(--teal2);padding:14px 0;}
.header-inner{max-width:1200px;margin:0 auto;padding:0 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.logo-text{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;color:var(--teal);letter-spacing:2px;text-transform:uppercase;}
.logo-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.back-btn{font-size:13px;color:var(--muted);text-decoration:none;transition:color .2s;}
.back-btn:hover{color:var(--teal);}
.user-badge{font-size:11px;color:var(--teal);background:rgba(0,191,165,.1);border:1px solid rgba(0,191,165,.2);border-radius:4px;padding:3px 10px;}
.main{max-width:1200px;margin:0 auto;padding:32px 28px 64px;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:28px;}
.stat-box{background:var(--dark2);border:1px solid var(--border2);border-radius:8px;padding:16px 18px;border-left:3px solid var(--sc,var(--teal));cursor:pointer;transition:border-color .2s;}
.stat-box:hover{border-color:var(--sc,var(--teal));opacity:.85;}
.stat-box.active{background:rgba(0,191,165,.05);}
.stat-val{font-family:'Montserrat',sans-serif;font-size:24px;font-weight:700;color:var(--sc,var(--teal));line-height:1;}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.8px;}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.search-box{flex:1;min-width:200px;background:var(--dark2);border:1px solid var(--border2);border-radius:6px;padding:9px 14px;font-size:13px;color:var(--white);font-family:'Open Sans',sans-serif;}
.search-box:focus{outline:none;border-color:var(--teal);}
.search-box::placeholder{color:var(--muted);}
.filter-sel{background:var(--dark2);border:1px solid var(--border2);border-radius:6px;padding:9px 12px;font-size:13px;color:var(--white);cursor:pointer;}
.filter-sel option{background:#071828;}
.add-btn{background:linear-gradient(135deg,var(--teal),var(--teal2));border:none;border-radius:6px;padding:9px 18px;font-size:13px;font-weight:700;color:white;cursor:pointer;font-family:'Montserrat',sans-serif;white-space:nowrap;transition:all .2s;}
.add-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,191,165,.3);}

/* TICKET CARDS */
.ticket-list{display:flex;flex-direction:column;gap:10px;}
.ticket-card{background:var(--dark2);border:1px solid var(--border2);border-radius:10px;padding:18px 20px;transition:border-color .2s,transform .15s;cursor:pointer;}
.ticket-card:hover{border-color:rgba(0,191,165,.3);transform:translateY(-1px);}
.ticket-card.priority-high{border-left:3px solid var(--red);}
.ticket-card.priority-medium{border-left:3px solid var(--amber);}
.ticket-card.priority-low{border-left:3px solid var(--teal);}
.tc-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px;}
.tc-code{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap;margin-top:2px;}
.tc-title{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;color:var(--white);flex:1;}
.tc-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--muted);}
.tc-desc{font-size:13px;color:var(--muted);margin:8px 0;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;white-space:nowrap;}
.b-pending{background:rgba(240,165,0,.12);color:#f0a500;}
.b-approved{background:rgba(0,191,165,.12);color:var(--teal);}
.b-rejected{background:rgba(239,83,80,.12);color:#ef5350;}
.b-in_progress{background:rgba(21,101,192,.15);color:#4fc3f7;}
.b-done{background:rgba(0,191,165,.08);color:var(--teal);border:1px solid rgba(0,191,165,.2);}
.b-cancelled{background:rgba(255,255,255,.05);color:var(--muted);}
.b-high{background:rgba(239,83,80,.12);color:#ef5350;}
.b-medium{background:rgba(240,165,0,.12);color:#f0a500;}
.b-low{background:rgba(0,191,165,.1);color:var(--teal);}
.b-purchase{background:rgba(171,71,188,.12);color:#ab47bc;}
.b-issue{background:rgba(255,112,67,.12);color:#ff7043;}
.b-improvement{background:rgba(21,101,192,.15);color:#4fc3f7;}
.b-other{background:rgba(255,255,255,.06);color:var(--muted);}
.tc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border2);flex-wrap:wrap;gap:8px;}
.tc-author{display:flex;align-items:center;gap:8px;}
.avatar-sm{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--blue));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:white;flex-shrink:0;}
.tc-actions{display:flex;gap:6px;}
.btn-sm{padding:5px 12px;font-size:11px;font-weight:600;border-radius:5px;cursor:pointer;border:1px solid;transition:all .15s;}
.btn-approve{background:rgba(0,191,165,.1);border-color:rgba(0,191,165,.3);color:var(--teal);}
.btn-approve:hover{background:rgba(0,191,165,.25);}
.btn-reject{background:rgba(239,83,80,.08);border-color:rgba(239,83,80,.2);color:#ef5350;}
.btn-reject:hover{background:rgba(239,83,80,.2);}
.btn-progress{background:rgba(21,101,192,.1);border-color:rgba(21,101,192,.3);color:#4fc3f7;}
.btn-done{background:rgba(0,191,165,.08);border-color:rgba(0,191,165,.2);color:var(--teal);}
.btn-cancel{background:rgba(255,255,255,.04);border-color:var(--border2);color:var(--muted);}

/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-backdrop.hidden{display:none;}
.modal{background:var(--dark2);border:1px solid var(--border);border-radius:12px;padding:28px;max-width:560px;width:100%;max-height:92vh;overflow-y:auto;}
.modal h3{font-family:'Montserrat',sans-serif;font-size:16px;font-weight:700;color:var(--white);margin-bottom:20px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.form-group input,.form-group select,.form-group textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:6px;padding:9px 12px;font-size:13px;color:var(--white);font-family:'Open Sans',sans-serif;transition:border-color .2s;resize:vertical;}
.form-group textarea{min-height:80px;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--teal);}
select option{background:#071828;color:#fff;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:6px;}
.btn-teal{background:linear-gradient(135deg,var(--teal),var(--teal2));color:white;border:none;border-radius:5px;padding:9px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Montserrat',sans-serif;}
.btn-cancel-modal{background:transparent;color:var(--muted);border:1px solid var(--border2);border-radius:5px;padding:9px 20px;font-size:13px;cursor:pointer;}

/* DETAIL MODAL */
.detail-section{background:rgba(255,255,255,.03);border:1px solid var(--border2);border-radius:8px;padding:14px 16px;margin-bottom:14px;}
.detail-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.detail-value{font-size:13px;color:var(--white);line-height:1.6;}
.timeline{display:flex;flex-direction:column;gap:12px;}
.timeline-item{display:flex;gap:12px;align-items:flex-start;}
.timeline-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);flex-shrink:0;margin-top:5px;}
.timeline-dot.red{background:#ef5350;}
.timeline-dot.amber{background:#f0a500;}
.timeline-content{flex:1;}
.timeline-title{font-size:13px;color:var(--white);font-weight:500;}
.timeline-time{font-size:11px;color:var(--muted);margin-top:2px;}

/* APPROVE MODAL */
.action-modal .modal{max-width:440px;}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-ico{font-size:48px;margin-bottom:12px;}

@media(max-width:768px){
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .form-row{grid-template-columns:1fr;}
  .tc-meta{gap:8px;}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="../" style="text-decoration:none;">
      <div class="logo-text">TTDCore</div>
      <div class="logo-sub">Phê duyệt & Yêu cầu</div>
    </a>
    <div style="display:flex;align-items:center;gap:12px;">
      <span class="user-badge" id="userBadge">Đang tải...</span>
      <a href="../" class="back-btn">← Về trang chủ</a>
    </div>
  </div>
</header>

<div class="main">
  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-box" style="--sc:#f0a500;" onclick="setFilter('pending')" id="sb-pending">
      <div class="stat-val" id="cnt-pending">0</div>
      <div class="stat-lbl">Chờ duyệt</div>
    </div>
    <div class="stat-box" style="--sc:#4fc3f7;" onclick="setFilter('in_progress')" id="sb-in_progress">
      <div class="stat-val" id="cnt-in_progress">0</div>
      <div class="stat-lbl">Đang xử lý</div>
    </div>
    <div class="stat-box" style="--sc:#00BFA5;" onclick="setFilter('approved')" id="sb-approved">
      <div class="stat-val" id="cnt-approved">0</div>
      <div class="stat-lbl">Đã duyệt</div>
    </div>
    <div class="stat-box" style="--sc:#ef5350;" onclick="setFilter('rejected')" id="sb-rejected">
      <div class="stat-val" id="cnt-rejected">0</div>
      <div class="stat-lbl">Từ chối</div>
    </div>
    <div class="stat-box" style="--sc:#7aafc0;" onclick="setFilter('all')" id="sb-all">
      <div class="stat-val" id="cnt-all">0</div>
      <div class="stat-lbl">Tất cả</div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <input type="text" class="search-box" placeholder="🔍 Tìm kiếm ticket..." oninput="renderTickets()">
    <select class="filter-sel" id="filterType" onchange="renderTickets()">
      <option value="">Tất cả loại</option>
      <option value="purchase">🛒 Mua sắm / Chi phí</option>
      <option value="issue">⚠️ Báo cáo vấn đề</option>
      <option value="improvement">💡 Đề xuất cải tiến</option>
      <option value="other">📋 Yêu cầu khác</option>
    </select>
    <select class="filter-sel" id="filterPriority" onchange="renderTickets()">
      <option value="">Tất cả ưu tiên</option>
      <option value="high">🔴 Cao</option>
      <option value="medium">🟡 Trung bình</option>
      <option value="low">🟢 Thấp</option>
    </select>
    <button class="add-btn" onclick="openCreateModal()">＋ Tạo yêu cầu</button>
  </div>

  <div class="ticket-list" id="ticketList">
    <div class="empty"><div class="empty-ico">⏳</div><p>Đang tải...</p></div>
  </div>
</div>

<!-- MODAL TẠO TICKET -->
<div class="modal-backdrop hidden" id="createModal">
  <div class="modal">
    <h3>📋 Tạo yêu cầu mới</h3>
    <div class="form-group">
      <label>Tiêu đề *</label>
      <input type="text" id="fTitle" placeholder="Mô tả ngắn gọn yêu cầu...">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Loại yêu cầu *</label>
        <select id="fType">
          <option value="purchase">🛒 Mua sắm / Chi phí</option>
          <option value="issue">⚠️ Báo cáo vấn đề</option>
          <option value="improvement">💡 Đề xuất cải tiến</option>
          <option value="other">📋 Yêu cầu khác</option>
        </select>
      </div>
      <div class="form-group">
        <label>Mức độ ưu tiên</label>
        <select id="fPriority">
          <option value="medium">🟡 Trung bình</option>
          <option value="high">🔴 Cao</option>
          <option value="low">🟢 Thấp</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Mô tả chi tiết</label>
      <textarea id="fDesc" placeholder="Giải thích chi tiết yêu cầu, lý do, số lượng, giá tham khảo..."></textarea>
    </div>
    <div class="form-group">
      <label>Link đính kèm (tùy chọn)</label>
      <input type="url" id="fUrl" placeholder="https://... (link báo giá, tài liệu, hình ảnh...)">
    </div>
    <div class="form-group">
      <label>Tên file / mô tả link</label>
      <input type="text" id="fUrlName" placeholder="VD: Báo giá máy in Canon">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel-modal" onclick="closeModal('createModal')">Hủy</button>
      <button class="btn-teal" onclick="createTicket()">Gửi yêu cầu</button>
    </div>
  </div>
</div>

<!-- MODAL XEM CHI TIẾT -->
<div class="modal-backdrop hidden" id="detailModal">
  <div class="modal" style="max-width:620px;">
    <div id="detailContent"></div>
    <div class="modal-actions" style="margin-top:0;">
      <button class="btn-cancel-modal" onclick="closeModal('detailModal')">Đóng</button>
    </div>
  </div>
</div>

<!-- MODAL DUYỆT / TỪ CHỐI -->
<div class="modal-backdrop hidden action-modal" id="actionModal">
  <div class="modal" style="max-width:440px;">
    <h3 id="actionTitle">Duyệt yêu cầu</h3>
    <div id="actionInfo" style="font-size:13px;color:var(--muted);margin-bottom:16px;"></div>
    <div class="form-group">
      <label>Ghi chú (tùy chọn)</label>
      <textarea id="actionNote" placeholder="Ghi chú thêm cho người tạo..." style="min-height:60px;"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel-modal" onclick="closeModal('actionModal')">Hủy</button>
      <button class="btn-teal" id="actionConfirmBtn" onclick="confirmAction()">Xác nhận</button>
    </div>
  </div>
</div>

<script>
// ============ SUPABASE ============
const SB_URL='https://fyjinbtabsentsvnkqzg.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5amluYnRhYnNlbnRzdm5rcXpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MTAxNTUsImV4cCI6MjA5NDI4NjE1NX0.m1H8bOT7gUXJxPoQT6bDqtRUjo4nCSxb4A1rth7Eols';
const SB_H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'};
const _sb=supabase.createClient(SB_URL,SB_KEY);

async function sbFetch(t,p=''){const r=await fetch(`${SB_URL}/rest/v1/${t}?${p}`,{headers:SB_H});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbPost(t,d){const r=await fetch(`${SB_URL}/rest/v1/${t}`,{method:'POST',headers:SB_H,body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbPatch(t,d,m){const p=Object.entries(m).map(([k,v])=>`${k}=eq.${encodeURIComponent(v)}`).join('&');const r=await fetch(`${SB_URL}/rest/v1/${t}?${p}`,{method:'PATCH',headers:SB_H,body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json();}

// ============ AUTH ============
const SUPER_ADMIN='vu@ttdglobal.vn';
const APPROVER='trade@ttdglobal.vn';
let _email='', _name='';
let _tickets=[];
let _statusFilter='all';
let _pendingAction={idx:null, action:null};

async function initAuth(){
  const {data:{session}}=await _sb.auth.getSession();
  if(session?.user){_email=session.user.email;}
  else{try{const s=localStorage.getItem('sb-fyjinbtabsentsvnkqzg-auth-token');if(s)_email=JSON.parse(s)?.user?.email||'';}catch{}}

  // Get name from employees table
  if(_email){
    try{
      const emps=await sbFetch('employees',`email=eq.${encodeURIComponent(_email)}&select=ten`);
      _name=emps[0]?.ten||_email.split('@')[0];
    }catch{_name=_email.split('@')[0];}
  }

  const badge=document.getElementById('userBadge');
  if(isApprover()){badge.textContent='👑 Quản lý';badge.style.background='rgba(240,165,0,.15);';}
  else if(_email){badge.textContent=_name||_email;}
  else{badge.textContent='Guest';}
}

function isApprover(){return _email===APPROVER||_email===SUPER_ADMIN;}

// ============ DATA ============
async function loadTickets(){
  try{
    const data=await sbFetch('tickets','order=created_at.desc');
    _tickets=data.map(t=>({...t}));
    updateStats();
    renderTickets();
  }catch(e){
    document.getElementById('ticketList').innerHTML=`<div class="empty"><div class="empty-ico">❌</div><p>Lỗi tải dữ liệu: ${e.message}</p></div>`;
  }
}

// ============ STATS ============
function updateStats(){
  const counts={pending:0,in_progress:0,approved:0,rejected:0,all:_tickets.length};
  _tickets.forEach(t=>{
    if(t.status==='pending')counts.pending++;
    else if(t.status==='in_progress')counts.in_progress++;
    else if(t.status==='approved'||t.status==='done')counts.approved++;
    else if(t.status==='rejected')counts.rejected++;
  });
  Object.entries(counts).forEach(([k,v])=>{
    const el=document.getElementById('cnt-'+k);
    if(el)el.textContent=v;
  });
}

function setFilter(s){
  _statusFilter=s;
  document.querySelectorAll('.stat-box').forEach(b=>b.classList.remove('active'));
  document.getElementById('sb-'+s)?.classList.add('active');
  renderTickets();
}

// ============ RENDER ============
const TYPE_LABEL={purchase:'🛒 Mua sắm',issue:'⚠️ Vấn đề',improvement:'💡 Đề xuất',other:'📋 Khác'};
const PRIORITY_LABEL={high:'🔴 Cao',medium:'🟡 Trung bình',low:'🟢 Thấp'};
const STATUS_LABEL={pending:'⏳ Chờ duyệt',approved:'✅ Đã duyệt',rejected:'❌ Từ chối',in_progress:'🔄 Đang xử lý',done:'✔️ Hoàn thành',cancelled:'🚫 Đã hủy'};

function initials(n){if(!n)return'?';const p=n.trim().split(' ');return p.length>=2?p[p.length-2][0]+p[p.length-1][0]:p[0][0];}

function renderTickets(){
  const search=document.querySelector('.search-box').value.toLowerCase();
  const typeF=document.getElementById('filterType').value;
  const prioF=document.getElementById('filterPriority').value;

  let filtered=_tickets.filter(t=>{
    const ms=!search||(t.title||'').toLowerCase().includes(search)||(t.description||'').toLowerCase().includes(search)||(t.code||'').toLowerCase().includes(search)||(t.created_by_name||'').toLowerCase().includes(search);
    const mt=!typeF||t.type===typeF;
    const mp=!prioF||t.priority===prioF;
    let mst=true;
    if(_statusFilter!=='all'){
      if(_statusFilter==='approved')mst=t.status==='approved'||t.status==='done';
      else mst=t.status===_statusFilter;
    }
    return ms&&mt&&mp&&mst;
  });

  const list=document.getElementById('ticketList');
  if(!filtered.length){
    list.innerHTML=`<div class="empty"><div class="empty-ico">📭</div><p>Không có yêu cầu nào</p></div>`;
    return;
  }

  list.innerHTML=filtered.map((t,i)=>{
    const realIdx=_tickets.findIndex(x=>x.id===t.id);
    const date=t.created_at?new Date(t.created_at).toLocaleDateString('vi-VN'):'';
    const isMine=t.created_by_email===_email;

    // Action buttons
    let btns='';
    if(isApprover()&&(t.status==='pending'||t.status==='in_progress')){
      btns+=`<button class="btn-sm btn-approve" onclick="event.stopPropagation();openAction(${realIdx},'approved')">✓ Duyệt</button>`;
      if(t.status==='pending')btns+=`<button class="btn-sm btn-progress" onclick="event.stopPropagation();openAction(${realIdx},'in_progress')">🔄 Xử lý</button>`;
      btns+=`<button class="btn-sm btn-reject" onclick="event.stopPropagation();openAction(${realIdx},'rejected')">✗ Từ chối</button>`;
    }
    if(isApprover()&&t.status==='approved'){
      btns+=`<button class="btn-sm btn-done" onclick="event.stopPropagation();openAction(${realIdx},'done')">✔ Hoàn thành</button>`;
    }
    if(isMine&&t.status==='pending'){
      btns+=`<button class="btn-sm btn-cancel" onclick="event.stopPropagation();openAction(${realIdx},'cancelled')">🚫 Hủy</button>`;
    }

    return`<div class="ticket-card priority-${t.priority}" onclick="openDetail(${realIdx})">
      <div class="tc-header">
        <div class="tc-code">${t.code||'#—'}</div>
        <div class="tc-title">${t.title}</div>
        <div style="display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;">
          <span class="badge b-${t.priority}">${PRIORITY_LABEL[t.priority]||t.priority}</span>
          <span class="badge b-${t.status}">${STATUS_LABEL[t.status]||t.status}</span>
        </div>
      </div>
      ${t.description?`<div class="tc-desc">${t.description}</div>`:''}
      <div class="tc-footer">
        <div class="tc-meta">
          <span class="badge b-${t.type}">${TYPE_LABEL[t.type]||t.type}</span>
          <span>📅 ${date}</span>
          ${t.attachment_url?`<a href="${t.attachment_url}" target="_blank" onclick="event.stopPropagation()" style="color:var(--teal);font-size:11px;text-decoration:none;">📎 ${t.attachment_name||'Link'}</a>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <div class="tc-author">
            <div class="avatar-sm">${initials(t.created_by_name)}</div>
            <span style="font-size:12px;color:var(--muted);">${t.created_by_name}</span>
          </div>
          <div class="tc-actions">${btns}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ============ DETAIL ============
function openDetail(idx){
  const t=_tickets[idx];if(!t)return;
  const date=t.created_at?new Date(t.created_at).toLocaleString('vi-VN'):'';
  const actionDate=t.action_at?new Date(t.action_at).toLocaleString('vi-VN'):'';
  const isMine=t.created_by_email===_email;

  let actionBtns='';
  if(isApprover()&&(t.status==='pending'||t.status==='in_progress')){
    actionBtns+=`<button class="btn-sm btn-approve" onclick="closeModal('detailModal');openAction(${idx},'approved')">✓ Duyệt</button>`;
    if(t.status==='pending')actionBtns+=`<button class="btn-sm btn-progress" onclick="closeModal('detailModal');openAction(${idx},'in_progress')">🔄 Đang xử lý</button>`;
    actionBtns+=`<button class="btn-sm btn-reject" onclick="closeModal('detailModal');openAction(${idx},'rejected')">✗ Từ chối</button>`;
  }
  if(isApprover()&&t.status==='approved'){
    actionBtns+=`<button class="btn-sm btn-done" onclick="closeModal('detailModal');openAction(${idx},'done')">✔ Hoàn thành</button>`;
  }
  if(isMine&&t.status==='pending'){
    actionBtns+=`<button class="btn-sm btn-cancel" onclick="closeModal('detailModal');openAction(${idx},'cancelled')">🚫 Hủy yêu cầu</button>`;
  }

  document.getElementById('detailContent').innerHTML=`
    <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:20px;">
      <div>
        <div style="font-size:11px;color:var(--muted);font-family:Montserrat,sans-serif;">${t.code||''}</div>
        <h3 style="font-size:17px;font-weight:700;color:var(--white);margin:4px 0 8px;">${t.title}</h3>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <span class="badge b-${t.type}">${TYPE_LABEL[t.type]||t.type}</span>
          <span class="badge b-${t.priority}">${PRIORITY_LABEL[t.priority]||t.priority}</span>
          <span class="badge b-${t.status}">${STATUS_LABEL[t.status]||t.status}</span>
        </div>
      </div>
    </div>

    ${t.description?`<div class="detail-section"><div class="detail-label">Mô tả chi tiết</div><div class="detail-value">${t.description.replace(/\n/g,'<br>')}</div></div>`:''}

    ${t.attachment_url?`<div class="detail-section"><div class="detail-label">Đính kèm</div><a href="${t.attachment_url}" target="_blank" style="color:var(--teal);font-size:13px;text-decoration:none;">📎 ${t.attachment_name||t.attachment_url}</a></div>`:''}

    <div class="detail-section">
      <div class="detail-label">Timeline</div>
      <div class="timeline">
        <div class="timeline-item">
          <div class="timeline-dot amber"></div>
          <div class="timeline-content">
            <div class="timeline-title">Tạo yêu cầu bởi <strong>${t.created_by_name}</strong></div>
            <div class="timeline-time">${date}</div>
          </div>
        </div>
        ${t.action_by?`<div class="timeline-item">
          <div class="timeline-dot ${t.status==='rejected'||t.status==='cancelled'?'red':''}" style="${t.status==='approved'||t.status==='done'?'background:var(--teal)':''}"></div>
          <div class="timeline-content">
            <div class="timeline-title">${STATUS_LABEL[t.status]||t.status} bởi <strong>${t.action_by}</strong>${t.action_note?` — "${t.action_note}"`:''}</div>
            <div class="timeline-time">${actionDate}</div>
          </div>
        </div>`:''}
      </div>
    </div>

    ${actionBtns?`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;">${actionBtns}</div>`:''}`;

  document.getElementById('detailModal').classList.remove('hidden');
}

// ============ ACTION ============
function openAction(idx, action){
  const t=_tickets[idx];if(!t)return;
  _pendingAction={idx,action};
  const titles={approved:'✅ Duyệt yêu cầu',rejected:'❌ Từ chối yêu cầu',in_progress:'🔄 Chuyển sang Đang xử lý',done:'✔️ Đánh dấu Hoàn thành',cancelled:'🚫 Hủy yêu cầu'};
  document.getElementById('actionTitle').textContent=titles[action]||action;
  document.getElementById('actionInfo').textContent=`"${t.title}"`;
  document.getElementById('actionNote').value='';
  const btnColors={approved:'background:linear-gradient(135deg,var(--teal),var(--teal2))',rejected:'background:linear-gradient(135deg,#ef5350,#c0392b)',in_progress:'background:linear-gradient(135deg,#1565C0,#0d47a1)',done:'background:linear-gradient(135deg,var(--teal),var(--teal2))',cancelled:'background:linear-gradient(135deg,#555,#333)'};
  document.getElementById('actionConfirmBtn').style.cssText=btnColors[action]||'';
  document.getElementById('actionConfirmBtn').textContent={approved:'✓ Duyệt',rejected:'✗ Từ chối',in_progress:'🔄 Xác nhận',done:'✔ Hoàn thành',cancelled:'🚫 Hủy'}[action]||'Xác nhận';
  document.getElementById('actionModal').classList.remove('hidden');
}

async function confirmAction(){
  const {idx,action}=_pendingAction;
  if(idx===null||!action)return;
  const t=_tickets[idx];if(!t)return;

  // Permission check
  if((action==='approved'||action==='rejected'||action==='in_progress'||action==='done')&&!isApprover()){
    alert('Không có quyền!');return;
  }
  if(action==='cancelled'&&t.created_by_email!==_email&&!isApprover()){
    alert('Không có quyền!');return;
  }

  const note=document.getElementById('actionNote').value.trim();
  const actorName=_name||_email;
  try{
    await sbPatch('tickets',{
      status:action,
      action_by:actorName,
      action_at:new Date().toISOString(),
      action_note:note||null,
      updated_at:new Date().toISOString()
    },{id:t.id});
    t.status=action;t.action_by=actorName;t.action_at=new Date().toISOString();t.action_note=note||null;
    closeModal('actionModal');
    updateStats();renderTickets();
    alert(`✅ Đã cập nhật: ${STATUS_LABEL[action]||action}`);
  }catch(e){alert('Lỗi: '+e.message);}
}

// ============ CREATE ============
function openCreateModal(){document.getElementById('createModal').classList.remove('hidden');}

async function createTicket(){
  const title=document.getElementById('fTitle').value.trim();
  if(!title){alert('Nhập tiêu đề yêu cầu!');return;}
  if(!_email){alert('Vui lòng đăng nhập!');return;}

  // Generate code: TTD-001
  const num=String(_tickets.length+1).padStart(3,'0');
  const code=`TTD-${num}`;

  const data={
    code,
    title,
    type:document.getElementById('fType').value,
    priority:document.getElementById('fPriority').value,
    description:document.getElementById('fDesc').value.trim()||null,
    attachment_url:document.getElementById('fUrl').value.trim()||null,
    attachment_name:document.getElementById('fUrlName').value.trim()||null,
    status:'pending',
    created_by_email:_email,
    created_by_name:_name||_email,
  };

  try{
    const res=await sbPost('tickets',data);
    _tickets.unshift({...data,...res[0]});
    closeModal('createModal');
    // Clear form
    ['fTitle','fDesc','fUrl','fUrlName'].forEach(id=>document.getElementById(id).value='');
    updateStats();renderTickets();
    alert(`✅ Đã gửi yêu cầu ${code} — chờ quản lý duyệt.`);
  }catch(e){alert('Lỗi: '+e.message);}
}

// ============ MODALS ============
function closeModal(id){document.getElementById(id).classList.add('hidden');}
document.querySelectorAll('.modal-backdrop').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.add('hidden');}));

// ============ INIT ============
async function init(){
  await initAuth();
  await loadTickets();
  // Default show all, highlight stat
  document.getElementById('sb-all')?.classList.add('active');
}
init();
</script>
</body>
</html>
