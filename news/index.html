  --border:#e2dbd2;--border2:#cec5ba;
  --green:#1d6b42;--gbg:#e8f4ee;--gbd:rgba(29,107,66,.2);

  --amber:#7a4f00;--abg:#fdf3e0;--abd:rgba(122,79,0,.2);

  --accent:#2d5a8e;
  --fn:'DM Serif Display',serif;--ss:'DM Sans',sans-serif;--mo:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--ss);font-size:13px;line-height:1.6}
.nav{background:var(--ink);color:#f8f5f0;display:flex;align-items:center;border-bottom:2px solid #333;position:sticky;top:0;z-index:50}
.nav-logo{font-family:var(--fn);font-size:17px;padding:13px 20px 13px 24px;border-right:1px solid #333;white-space:nowrap}
.nav-dates{display:flex;flex:1;overflow-x:auto}
.nd{font-size:11px;padding:13px 15px;cursor:pointer;color:#888;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;font-family:var(--ss);background:transparent;border-top:none;border-left:none;border-right:none;transition:all .15s}
.nd:hover{color:#f8f5f0;background:rgba(255,255,255,.05)}
.nd.active{color:#f8f5f0;border-bottom-color:#c8a97e}
.nav-right{margin-left:auto;padding:0 16px}
.pb{font-size:11px;padding:5px 12px;background:transparent;color:#888;border:1px solid #444;border-radius:2px;cursor:pointer;font-family:var(--ss)}
.pb:hover{color:#f8f5f0;border-color:#888}
.page{max-width:960px;margin:0 auto;padding:32px 24px 80px}

.mast{border-bottom:1.5px solid var(--ink);padding-bottom:18px;margin-bottom:24px}
.mast-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.mast-ey{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.mast-h{font-family:var(--fn);font-size:28px;color:var(--ink);line-height:1.1}
.mast-s{font-size:11px;color:var(--muted);margin-top:4px}
.mast-dr{text-align:right;flex-shrink:0}
.mast-db{font-family:var(--fn);font-size:19px;color:var(--ink)}
.mast-ds{font-size:10px;color:var(--muted);margin-top:2px}

.pr-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border2);border:1px solid var(--border2);border-radius:3px;overflow:hidden;margin-bottom:10px}
@media(max-width:580px){.pr-row{grid-template-columns:1fr 1fr}}
.pr-i{background:var(--paper);padding:11px 13px}
.pr-l{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.pr-p{font-family:var(--mo);font-size:17px;color:var(--ink)}
.pr-c{font-size:11px;font-weight:500;margin-top:2px;font-family:var(--mo)}
.pr-u{font-size:10px;color:var(--dim)}
.cup{color:var(--green)}.cdn{color:var(--red)}.cfl{color:var(--muted)}

.spr{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.si{flex:1;min-width:100px;background:var(--paper2);border:1px solid var(--border);border-radius:3px;padding:8px 10px;display:flex;align-items:center;justify-content:space-between;gap:6px}
.sil{font-size:10px;color:var(--muted)}.sin{font-size:10px;color:var(--dim)}.siv{font-family:var(--mo);font-size:12px;font-weight:500;color:var(--ink);white-space:nowrap}

.sl{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin-bottom:9px;display:flex;align-items:center;gap:9px}
.sl::after{content:'';flex:1;height:1px;background:var(--border)}
.sec{margin-bottom:22px}

.hl{border-radius:3px;padding:10px 13px;margin-bottom:8px;border-left:3px solid}
.hl-g{background:var(--gbg);border-color:var(--green)}
.hl-r{background:var(--rbg);border-color:var(--red)}
.hl-a{background:var(--abg);border-color:var(--amber)}
.hl-b{background:var(--bbg);border-color:var(--blue)}
.hh{font-size:10px;letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px}
.hl-g .hh{color:var(--green)}.hl-r .hh{color:var(--red)}.hl-a .hh{color:var(--amber)}.hl-b .hh{color:var(--blue)}
.hb{font-size:12.5px;color:var(--ink);line-height:1.75}

.ftbl{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px}
.ftbl th{font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:var(--dim);padding:6px 9px;border-bottom:1.5px solid var(--border2);text-align:left;white-space:nowrap}
.ftbl td{padding:6px 9px;border-bottom:1px solid var(--border);vertical-align:middle;font-family:var(--mo);font-size:11.5px}
.ftbl tr:last-child td{border-bottom:none}
.ftbl tr.hi td{background:var(--paper2);font-weight:500}
.ftbl tr.warn td{background:var(--abg)}
.up{color:var(--green);font-weight:500}.dn{color:var(--red);font-weight:500}

.macro-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:6px;margin-bottom:12px}
.macro-item{background:var(--paper);border:1px solid var(--border);border-radius:3px;padding:8px 10px}
.macro-l{font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.macro-v{font-family:var(--mo);font-size:14px;color:var(--ink)}
.macro-c{font-size:10px;font-family:var(--mo);margin-top:2px}

.stbl{width:100%;border-collapse:collapse}
.stbl th{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);padding:6px 10px;border-bottom:1.5px solid var(--border2);text-align:left}
.stbl td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:12px}
.stbl tr:last-child td{border-bottom:none}
.stbl tr:hover td{background:var(--paper2)}
.src{color:var(--dim);font-size:10px;font-family:var(--mo)}
.tag{display:inline-flex;font-size:10px;padding:2px 7px;border-radius:2px;white-space:nowrap}
.t-up{background:var(--gbg);color:var(--green);border:1px solid var(--gbd)}
.t-dn{background:var(--rbg);color:var(--red);border:1px solid var(--rbd)}
.t-ne{background:var(--paper2);color:var(--muted);border:1px solid var(--border)}
.t-wa{background:var(--abg);color:var(--amber);border:1px solid var(--abd)}

.score{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.sc{flex:1;min-width:80px;background:var(--paper);border:1px solid var(--border);border-radius:3px;padding:9px 11px;text-align:center}
.scv{font-family:var(--fn);font-size:22px}
.scl{font-size:9px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-top:2px}

.bc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:520px){.bc-grid{grid-template-columns:1fr}}
.bc{background:var(--paper);border:1px solid var(--border);border-radius:3px;padding:11px 13px}

.bc-code{font-family:var(--mo);font-size:12px;color:var(--ink)}
.bc-badge{font-size:10px;padding:2px 8px;border-radius:2px}

.bb-short{background:var(--rbg);color:var(--red);border:1px solid var(--rbd)}
.bb-watch{background:var(--abg);color:var(--amber);border:1px solid var(--abd)}
.bb-neu{background:var(--paper2);color:var(--muted);border:1px solid var(--border)}

.bc-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;border-bottom:1px solid var(--border)}

.ab-v{font-size:10px;padding:2px 8px;border-radius:2px}

.av-dn{background:var(--rbg);color:var(--red);border:1px solid var(--rbd)}
.av-wa{background:var(--abg);color:var(--amber);border:1px solid var(--abd)}
.av-bl{background:var(--bbg);color:var(--blue);border:1px solid var(--bbd)}

.ab-body p{font-size:12.5px;line-height:1.8;color:var(--ink);margin-bottom:5px}
.ab-body p:last-child{margin:0}

.wi{background:var(--paper);border:1px solid var(--border);border-radius:3px;padding:9px 11px}
.wt{font-size:10px;color:var(--accent);margin-bottom:2px;font-family:var(--mo)}
.we{font-size:12px;color:var(--ink);margin-bottom:2px}
.wn{font-size:10px;color:var(--muted)}

.cg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
@media(max-width:520px){.cg{grid-template-columns:1fr}}

.cih{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.cib{font-size:12px;line-height:1.75;color:var(--ink)}
.cib strong{font-weight:500}

.risk{background:var(--abg);border:1px solid var(--abd);border-radius:3px;padding:12px 14px}
.rh{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);margin-bottom:7px}
.rl{list-style:none}
.rl li{font-size:12px;line-height:1.75;display:flex;gap:7px;margin-bottom:3px}
.rl li::before{content:'→';color:var(--amber);flex-shrink:0}
.rl li:last-child{margin:0}

.chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.chip{font-size:10px;padding:2px 8px;border-radius:99px;border:1px solid var(--border2);color:var(--muted)}
.chip.on{border-color:var(--accent);color:var(--accent);background:var(--bbg)}

.alert-box{background:var(--ink);color:var(--paper);border-radius:4px;padding:14px 18px;margin-bottom:16px}
.alert-box h3{font-family:var(--fn);font-size:18px;margin-bottom:6px;color:#fdf3e0}
.alert-box p{font-size:12.5px;color:rgba(250,247,242,.8);line-height:1.75}
.alert-box .mono{font-family:var(--mo);color:#c8a97e;font-size:13px}

.footer{margin-top:28px;padding-top:12px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.fs{font-size:10px;color:var(--dim);line-height:1.6}
.fs strong{display:block;font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:var(--dim);margin-bottom:2px}
.fst{font-family:var(--fn);font-size:12px;color:var(--muted)}
@media print{.nav{display:none}body{background:white}.page{padding:20px}}
</style>

let reports=[],cur=null;
function load(){
  try{const r=localStorage.getItem(SK);if(r)reports=JSON.parse(r);}catch(e){}
  if(!reports.length){reports=JSON.parse(JSON.stringify(SEED));save();}
  reports.sort((a,b)=>b.id.localeCompare(a.id));
  cur=reports[0].id;
}
function save(){try{localStorage.setItem(SK,JSON.stringify(reports));}catch(e){}}
function renderNav(){
  document.getElementById('navDates').innerHTML=reports.map(r=>
    `<button class="nd${r.id===cur?' active':''}" onclick="sw('${r.id}')">${r.date}</button>`
  ).join('');
}
function sw(id){cur=id;renderNav();render();}
function esc(s){return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function render(){
  const r=reports.find(x=>x.id===cur);

    <h3>${r.alert.title}</h3>

  </div>`:'';

  }

  const wtH=r.watch&&r.watch.length?`<div class="sec"><div class="sl">Theo dõi tuần này</div><div class="wg">${r.watch.map(w=>`<div class="wi"><div class="wt">${w.t}</div><div class="we">${w.e}</div><div class="wn">${w.n}</div></div>`).join('')}</div></div>`:'';
  const cnH=`<div class="cg">${r.concl.filter(c=>c.h).map(c=>`<div class="ci"><div class="cih">${c.h}</div><div class="cib">${c.b}</div></div>`).join('')}</div>`;
  const rkH=`<div class="risk"><div class="rh">⚠ Rủi ro & Cảnh báo</div><ul class="rl">${r.risks.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`;

  el.innerHTML=`
    <div class="mast">
      <div class="mast-top">
        <div><div class="mast-ey">Phân tích kỹ thuật & cơ bản · acaphe.com</div>
          <div class="mast-h">Nhận định Cà phê · 4 hợp đồng</div>
          <div class="mast-s">RMU26 · KCU26 · Basis FOB · Nội địa · ICE Stocks · Macro</div>
        </div>
        <div class="mast-dr"><div class="mast-db">${r.date}</div><div class="mast-ds">${r.label}</div></div>
      </div>
    </div>
    <div class="sec">
      <div class="sl">Nguồn</div>
      <div class="chips">${(r.sources||[]).map(s=>`<span class="chip on">${s}</span>`).join('')}</div>
    </div>
    ${alertH}
    <div class="sec">
      <div class="sl">Giá · acaphe 29/6 10:59 GMT+7</div>
      ${prH}${sprH}${hlH}
    </div>
    ${fullH}
    ${macroH}
    ${scH?`<div class="sec"><div class="sl">Tổng điểm tín hiệu</div>${scH}</div>`:''}
    <div class="sec"><div class="sl">Tổng hợp tín hiệu</div>${sigH}</div>
    <div class="sec"><div class="sl">Bias & thực chiến</div>${biasH}</div>
    <div class="sec"><div class="sl">Nhận định chính</div>${ab(r.short)}${ab(r.mid)}${ab(r.long)}</div>
    ${wtH}
    <div class="sec"><div class="sl">Kết luận</div>${cnH}</div>
    <div class="sec"><div class="sl">Rủi ro</div>${rkH}</div>
    <div class="footer"><div class="fs"><strong>Nguồn</strong>${r.footer}</div><div class="fst">${r.label}</div></div>`;
}

window.addReport=function(o){
  const i=reports.findIndex(r=>r.id===o.id);
  if(i>=0)reports[i]=o;else reports.unshift(o);
  reports.sort((a,b)=>b.id.localeCompare(a.id));
  save();cur=o.id;renderNav();render();
};
load();renderNav();render();
</script>
</body>
