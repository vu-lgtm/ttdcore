<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nội quy — TTDCore</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --teal:#00BFA5;--teal2:#00897B;
  --dark:#04111f;--dark2:#071828;
  --white:#fff;--muted:#7aafc0;--border:rgba(0,191,165,0.15);--border2:rgba(255,255,255,0.07);
}
body{font-family:'Open Sans',sans-serif;background:var(--dark);color:var(--white);min-height:100vh;}
header{background:var(--dark2);border-bottom:2px solid var(--teal2);padding:14px 0;}
.header-inner{max-width:1100px;margin:0 auto;padding:0 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.logo-text{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;color:var(--teal);letter-spacing:2px;text-transform:uppercase;}
.logo-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.back-btn{font-size:13px;color:var(--muted);text-decoration:none;}
.back-btn:hover{color:var(--teal);}
.user-badge{font-size:11px;color:var(--teal);background:rgba(0,191,165,.1);border:1px solid rgba(0,191,165,.2);border-radius:4px;padding:3px 10px;}
.main{max-width:1100px;margin:0 auto;padding:32px 28px 64px;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px;}
.stat-box{background:var(--dark2);border:1px solid var(--border2);border-radius:8px;padding:16px 18px;border-left:3px solid var(--sc,var(--teal));}
.stat-val{font-family:'Montserrat',sans-serif;font-size:22px;font-weight:700;color:var(--sc,var(--teal));line-height:1;}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.8px;}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.search-box{flex:1;min-width:200px;background:var(--dark2);border:1px solid var(--border2);border-radius:6px;padding:9px 14px;font-size:13px;color:var(--white);}
.search-box:focus{outline:none;border-color:var(--teal);}
.search-box::placeholder{color:var(--muted);}
.filter-sel{background:var(--dark2);border:1px solid var(--border2);border-radius:6px;padding:9px 12px;font-size:13px;color:var(--white);cursor:pointer;}
.filter-sel option{background:#071828;}
.upload-btn{background:linear-gradient(135deg,var(--teal),var(--teal2));border:none;border-radius:6px;padding:9px 18px;font-size:13px;font-weight:700;color:white;cursor:pointer;white-space:nowrap;transition:all .2s;}
.upload-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,191,165,.3);}

/* CAT TABS */
.cat-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.cat-tab{padding:7px 16px;background:var(--dark2);border:1px solid var(--border2);border-radius:20px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s;}
.cat-tab:hover{border-color:var(--teal);color:var(--teal);}
.cat-tab.active{background:rgba(0,191,165,.12);border-color:var(--teal);color:var(--teal);}

/* FILE GRID */
.file-grid{width:100%;border-collapse:collapse;background:var(--dark2);border-radius:10px;overflow:hidden;border:1px solid var(--border2);}
.file-card th{background:rgba(0,191,165,.08);padding:11px 16px;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:1px;text-align:left;border-bottom:1px solid var(--border2);}.file-card td{padding:10px 16px;font-size:13px;color:var(--white);border-bottom:1px solid var(--border2);vertical-align:middle;}.file-card tr:last-child td{border-bottom:none;}.file-card tr:hover td{background:rgba(0,191,165,.03);cursor:pointer;}

.file-icon{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.file-icon.pdf{background:rgba(239,83,80,.12);}
.file-icon.word{background:rgba(21,101,192,.12);}
.file-icon.excel{background:rgba(0,191,165,.1);}
.file-icon.image{background:rgba(171,71,188,.12);}
.file-icon.other{background:rgba(255,255,255,.06);}
.file-name{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;color:var(--white);line-height:1.4;word-break:break-word;}
.file-desc{font-size:12px;color:var(--muted);line-height:1.5;}
.file-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.cat-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:rgba(0,191,165,.1);color:var(--teal);border:1px solid rgba(0,191,165,.2);}
.file-size-txt{font-size:11px;color:var(--muted);}
.file-date{font-size:11px;color:var(--muted);}
.file-uploader{font-size:11px;color:var(--muted);}
.file-actions{display:flex;gap:8px;margin-top:auto;}
.btn-download{flex:1;background:linear-gradient(135deg,var(--teal),var(--teal2));border:none;border-radius:6px;padding:8px;font-size:12px;font-weight:700;color:white;cursor:pointer;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .2s;}
.btn-download:hover{transform:translateY(-1px);}
.btn-delete{background:rgba(239,83,80,.08);border:1px solid rgba(239,83,80,.2);border-radius:6px;padding:8px 12px;font-size:12px;color:#ef5350;cursor:pointer;transition:all .2s;}
.btn-delete:hover{background:rgba(239,83,80,.2);}

/* UPLOAD ZONE */
.drop-zone{border:2px dashed rgba(0,191,165,.3);border-radius:10px;padding:32px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(0,191,165,.02);margin-bottom:16px;}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--teal);background:rgba(0,191,165,.06);}
.drop-zone-icon{font-size:40px;margin-bottom:10px;}
.drop-zone-text{font-size:14px;color:var(--muted);line-height:1.6;}
.drop-zone-text strong{color:var(--teal);}
.drop-zone input{display:none;}
.upload-progress{margin-top:12px;background:rgba(255,255,255,.05);border-radius:6px;overflow:hidden;height:6px;display:none;}
.upload-progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--teal2));transition:width .3s;width:0%;}

/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-backdrop.hidden{display:none;}
.modal{background:var(--dark2);border:1px solid var(--border);border-radius:12px;padding:28px;max-width:520px;width:100%;max-height:92vh;overflow-y:auto;}
.modal h3{font-family:'Montserrat',sans-serif;font-size:16px;font-weight:700;color:var(--white);margin-bottom:20px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.form-group input,.form-group select,.form-group textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:6px;padding:9px 12px;font-size:13px;color:var(--white);font-family:'Open Sans',sans-serif;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--teal);}
select option{background:#071828;}
.form-group textarea{min-height:60px;resize:vertical;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:6px;}
.btn-teal{background:linear-gradient(135deg,var(--teal),var(--teal2));color:white;border:none;border-radius:5px;padding:9px 20px;font-size:13px;font-weight:600;cursor:pointer;}
.btn-cancel-modal{background:transparent;color:var(--muted);border:1px solid var(--border2);border-radius:5px;padding:9px 20px;font-size:13px;cursor:pointer;}

.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-ico{font-size:48px;margin-bottom:12px;}
.loading{text-align:center;padding:40px;color:var(--muted);}

@media(max-width:768px){
  .stats-row{grid-template-columns:repeat(2,1fr);}

}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="../" style="text-decoration:none;">
      <div class="logo-text">TTDCore</div>
      <div class="logo-sub">Nội quy & Tài liệu</div>
    </a>
    <div style="display:flex;align-items:center;gap:12px;">
      <span class="user-badge" id="userBadge">Đang tải...</span>
      <a href="../" class="back-btn">← Về trang chủ</a>
    </div>
  </div>
</header>

<div class="main">
  <div class="stats-row">
    <div class="stat-box" style="--sc:#00BFA5;"><div class="stat-val" id="cnt-total">0</div><div class="stat-lbl">Tổng tài liệu</div></div>
    <div class="stat-box" style="--sc:#4fc3f7;"><div class="stat-val" id="cnt-policy">0</div><div class="stat-lbl">Nội quy</div></div>
    <div class="stat-box" style="--sc:#ab47bc;"><div class="stat-val" id="cnt-process">0</div><div class="stat-lbl">Quy trình</div></div>
    <div class="stat-box" style="--sc:#f0a500;"><div class="stat-val" id="cnt-form">0</div><div class="stat-lbl">Biểu mẫu</div></div>
  </div>

  <div class="toolbar">
    <input type="text" class="search-box" placeholder="🔍 Tìm kiếm tài liệu..." oninput="renderFiles()">
    <select class="filter-sel" id="filterCat" onchange="renderFiles()">
      <option value="">Tất cả danh mục</option>
      <option value="policy">📜 Nội quy</option>
      <option value="process">⚙️ Quy trình</option>
      <option value="form">📝 Biểu mẫu</option>
      <option value="contract">📄 Hợp đồng mẫu</option>
      <option value="other">📁 Khác</option>
    </select>
    <button class="upload-btn" id="uploadBtn" style="display:none;" onclick="openUploadModal()">⬆ Upload tài liệu</button>
  </div>

  <div class="cat-tabs" id="catTabs">
    <div class="cat-tab active" onclick="setCat('',this)">Tất cả</div>
    <div class="cat-tab" onclick="setCat('policy',this)">📜 Nội quy</div>
    <div class="cat-tab" onclick="setCat('process',this)">⚙️ Quy trình</div>
    <div class="cat-tab" onclick="setCat('form',this)">📝 Biểu mẫu</div>
    <div class="cat-tab" onclick="setCat('contract',this)">📄 Hợp đồng mẫu</div>
    <div class="cat-tab" onclick="setCat('other',this)">📁 Khác</div>
  </div>

  <table class="file-grid" id="fileGrid">
    <tr><td colspan="5" style="text-align:center;padding:40px;color:var(--muted);">⏳ Đang tải...</td></tr>
  </div>
</div>

<!-- MODAL UPLOAD -->
<div class="modal-backdrop hidden" id="uploadModal">
  <div class="modal">
    <h3>⬆ Upload tài liệu mới</h3>

    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
      <div class="drop-zone-icon">📂</div>
      <div class="drop-zone-text">
        <strong>Kéo thả file vào đây</strong> hoặc click để chọn<br>
        <span style="font-size:12px;">PDF, Word, Excel, hình ảnh... Tối đa 20MB</span>
      </div>
      <input type="file" id="fileInput" onchange="onFileSelect(event)" accept=".pdf,.doc,.docx,.xls,.xlsx,.png,.jpg,.jpeg,.ppt,.pptx,.txt">
    </div>
    <div id="filePreview" style="display:none;background:rgba(0,191,165,.06);border:1px solid rgba(0,191,165,.15);border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:var(--muted);"></div>
    <div class="upload-progress" id="uploadProgress"><div class="upload-progress-fill" id="uploadFill"></div></div>

    <div class="form-group">
      <label>Tên tài liệu *</label>
      <input type="text" id="fRegTitle" placeholder="VD: Nội quy làm việc TTD Global 2026">
    </div>
    <div class="form-group">
      <label>Danh mục</label>
      <select id="fRegCat">
        <option value="policy">📜 Nội quy</option>
        <option value="process">⚙️ Quy trình</option>
        <option value="form">📝 Biểu mẫu</option>
        <option value="contract">📄 Hợp đồng mẫu</option>
        <option value="other">📁 Khác</option>
      </select>
    </div>
    <div class="form-group">
      <label>Mô tả ngắn (tùy chọn)</label>
      <textarea id="fRegDesc" placeholder="Mô tả nội dung tài liệu..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel-modal" onclick="closeModal()">Hủy</button>
      <button class="btn-teal" id="uploadConfirmBtn" onclick="uploadFile()" disabled>⬆ Upload</button>
    </div>
  </div>
</div>

<script>
const SB_URL='https://fyjinbtabsentsvnkqzg.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5amluYnRhYnNlbnRzdm5rcXpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MTAxNTUsImV4cCI6MjA5NDI4NjE1NX0.m1H8bOT7gUXJxPoQT6bDqtRUjo4nCSxb4A1rth7Eols';
const SB_H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'};
const _sb=supabase.createClient(SB_URL,SB_KEY);

// ============ PERMISSIONS ============
const UPLOADERS=['vu@ttdglobal.vn','trade@ttdglobal.vn','duom@ttdglobal.vn'];
let _email='',_name='',_files=[];
let _catFilter='';
const MAX_SIZE=20*1024*1024; // 20MB

async function initAuth(){
  const {data:{session}}=await _sb.auth.getSession();
  if(session?.user)_email=session.user.email;
  else{try{const s=localStorage.getItem('sb-fyjinbtabsentsvnkqzg-auth-token');if(s)_email=JSON.parse(s)?.user?.email||'';}catch{}}
  if(_email){
    try{const e=await sbFetch('employees',`email=eq.${encodeURIComponent(_email)}&select=ten`);_name=e[0]?.ten||_email.split('@')[0];}
    catch{_name=_email.split('@')[0];}
  }
  const badge=document.getElementById('userBadge');
  const canUpload=UPLOADERS.includes(_email);
  if(canUpload){badge.textContent='✏️ '+(_name||_email);document.getElementById('uploadBtn').style.display='block';}
  else if(_email){badge.textContent=_name||_email;}
  else{badge.textContent='Guest';}
}

function canUpload(){return UPLOADERS.includes(_email);}
function canDelete(uploadedBy){return _email==='vu@ttdglobal.vn'||uploadedBy===_email;}

async function sbFetch(t,p=''){const r=await fetch(`${SB_URL}/rest/v1/${t}?${p}`,{headers:SB_H});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbPost(t,d){const r=await fetch(`${SB_URL}/rest/v1/${t}`,{method:'POST',headers:SB_H,body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbDel(t,id){const r=await fetch(`${SB_URL}/rest/v1/${t}?id=eq.${id}`,{method:'DELETE',headers:SB_H});if(!r.ok)throw new Error(await r.text());}

// ============ LOAD DATA ============
async function loadFiles(){
  try{
    const data=await sbFetch('regulations','order=created_at.desc');
    _files=data||[];updateStats();renderFiles();
  }catch(e){
    document.getElementById('fileGrid').innerHTML=`<div class="empty"><div class="empty-ico">❌</div><p>Lỗi: ${e.message}</p></div>`;
  }
}

function updateStats(){
  document.getElementById('cnt-total').textContent=_files.length;
  document.getElementById('cnt-policy').textContent=_files.filter(f=>f.category==='policy').length;
  document.getElementById('cnt-process').textContent=_files.filter(f=>f.category==='process').length;
  document.getElementById('cnt-form').textContent=_files.filter(f=>f.category==='form').length;
}

// ============ RENDER ============
const CAT_LABEL={policy:'📜 Nội quy',process:'⚙️ Quy trình',form:'📝 Biểu mẫu',contract:'📄 HĐ mẫu',other:'📁 Khác'};

function getFileIcon(type){
  if(!type)return{cls:'other',ico:'📄'};
  if(type.includes('pdf'))return{cls:'pdf',ico:'📕'};
  if(type.includes('word')||type.includes('doc'))return{cls:'word',ico:'📘'};
  if(type.includes('sheet')||type.includes('excel')||type.includes('xls'))return{cls:'excel',ico:'📗'};
  if(type.includes('image')||type.includes('png')||type.includes('jpg'))return{cls:'image',ico:'🖼️'};
  if(type.includes('presentation')||type.includes('ppt'))return{cls:'other',ico:'📊'};
  return{cls:'other',ico:'📄'};
}

function formatSize(bytes){
  if(!bytes)return'';
  if(bytes<1024)return bytes+'B';
  if(bytes<1048576)return(bytes/1024).toFixed(1)+'KB';
  return(bytes/1048576).toFixed(1)+'MB';
}

function setCat(cat,el){
  _catFilter=cat;
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('filterCat').value=cat;
  renderFiles();
}

function renderFiles(){
  const search=document.querySelector('.search-box').value.toLowerCase();
  const catF=document.getElementById('filterCat').value||_catFilter;

  let filtered=_files.filter(f=>{
    const ms=!search||(f.title||'').toLowerCase().includes(search)||(f.description||'').toLowerCase().includes(search)||(f.file_name||'').toLowerCase().includes(search);
    const mc=!catF||f.category===catF;
    return ms&&mc;
  });

  const grid=document.getElementById('fileGrid');
  if(!filtered.length){
    grid.innerHTML=`<tr><td colspan="5" style="text-align:center;padding:60px;color:var(--muted);"><div style="font-size:40px;margin-bottom:12px;">📭</div><p>Chưa có tài liệu nào</p></td></tr>`;return;
    return;
  }

  // Add table header
  const thead=`<thead><tr>
    <th style="width:40px;"></th>
    <th>Tên tài liệu</th>
    <th style="width:140px;">Danh mục</th>
    <th style="width:120px;">Ngày đăng</th>
    <th style="width:140px;">Thao tác</th>
  </tr></thead>`;
  const rows=filtered.map(f=>{
    const icon=getFileIcon(f.file_type);
    const date=f.created_at?new Date(f.created_at).toLocaleDateString('vi-VN'):'';
    const delBtn=canDelete(f.uploaded_by_email)?`<button class="btn-delete" style="padding:5px 10px;font-size:11px;" onclick="event.stopPropagation();deleteFile('${f.id}','${f.file_path}','${f.title.replace(/'/g,'')}')">🗑</button>`:'';
    return`<tr onclick="downloadFile('${f.file_path}','${f.file_name}')" title="Click để tải xuống">
      <td><span style="font-size:20px;">${icon.ico}</span></td>
      <td>
        <div style="font-family:Montserrat,sans-serif;font-size:13px;font-weight:600;color:var(--white);">${f.title}</div>
        ${f.description?`<div style="font-size:11px;color:var(--muted);margin-top:2px;">${f.description}</div>`:''}
      </td>
      <td><span class="cat-badge">${CAT_LABEL[f.category]||f.category}</span></td>
      <td style="font-size:12px;color:var(--muted);">${date}</td>
      <td>
        <div style="display:flex;gap:6px;align-items:center;">
          <button class="btn-download" style="padding:6px 12px;font-size:11px;white-space:nowrap;" onclick="event.stopPropagation();downloadFile('${f.file_path}','${f.file_name}')">⬇ Tải xuống</button>
          ${delBtn}
        </div>
      </td>
    </tr>`;
  }).join('');
  grid.innerHTML=thead+'<tbody>'+rows+'</tbody>';
}

// ============ DOWNLOAD ============
async function downloadFile(path,name){
  try{
    const {data,error}=await _sb.storage.from('regulations').download(path);
    if(error)throw error;
    const url=URL.createObjectURL(data);
    const a=document.createElement('a');a.href=url;a.download=name;a.click();
    URL.revokeObjectURL(url);
  }catch(e){alert('Lỗi tải file: '+e.message);}
}

// ============ DELETE ============
async function deleteFile(id,path,title){
  if(!confirm(`Xóa tài liệu "${title}"?`))return;
  try{
    await _sb.storage.from('regulations').remove([path]);
    await sbDel('regulations',id);
    _files=_files.filter(f=>f.id!==id);
    updateStats();renderFiles();
  }catch(e){alert('Lỗi xóa: '+e.message);}
}

// ============ UPLOAD ============
let _selectedFile=null;

function openUploadModal(){
  if(!canUpload()){alert('Không có quyền upload!');return;}
  _selectedFile=null;
  document.getElementById('filePreview').style.display='none';
  document.getElementById('uploadConfirmBtn').disabled=true;
  document.getElementById('uploadProgress').style.display='none';
  document.getElementById('uploadFill').style.width='0%';
  ['fRegTitle','fRegDesc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('uploadModal').classList.remove('hidden');
}

function onDragOver(e){e.preventDefault();document.getElementById('dropZone').classList.add('dragover');}
function onDragLeave(){document.getElementById('dropZone').classList.remove('dragover');}
function onDrop(e){e.preventDefault();document.getElementById('dropZone').classList.remove('dragover');const files=e.dataTransfer.files;if(files.length)handleFile(files[0]);}
function onFileSelect(e){if(e.target.files.length)handleFile(e.target.files[0]);}

function handleFile(file){
  if(file.size>MAX_SIZE){alert('File quá 20MB!');return;}
  _selectedFile=file;
  const icon=getFileIcon(file.type);
  document.getElementById('filePreview').style.display='block';
  document.getElementById('filePreview').innerHTML=`${icon.ico} <strong style="color:var(--white);">${file.name}</strong> <span style="color:var(--muted);">(${formatSize(file.size)})</span>`;
  // Auto fill title từ tên file
  if(!document.getElementById('fRegTitle').value){
    document.getElementById('fRegTitle').value=file.name.replace(/\.[^/.]+$/,'');
  }
  document.getElementById('uploadConfirmBtn').disabled=false;
}

async function uploadFile(){
  if(!_selectedFile){alert('Chọn file trước!');return;}
  const title=document.getElementById('fRegTitle').value.trim();
  if(!title){alert('Nhập tên tài liệu!');return;}

  const btn=document.getElementById('uploadConfirmBtn');
  btn.disabled=true;btn.textContent='Đang upload...';
  document.getElementById('uploadProgress').style.display='block';

  try{
    // Tạo path unique
    const ext=_selectedFile.name.split('.').pop();
    const safeName=_selectedFile.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    const path=`${Date.now()}_${safeName}`;

    // Animate progress
    let pct=0;const timer=setInterval(()=>{pct=Math.min(pct+5,85);document.getElementById('uploadFill').style.width=pct+'%';},100);

    const{error:upErr}=await _sb.storage.from('regulations').upload(path,_selectedFile,{upsert:false});
    clearInterval(timer);
    if(upErr)throw upErr;
    document.getElementById('uploadFill').style.width='100%';

    // Lưu metadata
    const meta={
      title,
      category:document.getElementById('fRegCat').value,
      description:document.getElementById('fRegDesc').value.trim()||null,
      file_path:path,
      file_name:_selectedFile.name,
      file_size:_selectedFile.size,
      file_type:_selectedFile.type,
      uploaded_by_email:_email,
      uploaded_by_name:_name||_email,
    };
    const res=await sbPost('regulations',meta);
    _files.unshift({...meta,...res[0]});

    closeModal();
    updateStats();renderFiles();
    alert(`✅ Upload thành công: "${title}"`);
  }catch(e){
    alert('Lỗi upload: '+e.message);
    btn.disabled=false;btn.textContent='⬆ Upload';
  }
}

// ============ MODAL ============
function closeModal(){document.getElementById('uploadModal').classList.add('hidden');_selectedFile=null;}
document.getElementById('uploadModal').addEventListener('click',e=>{if(e.target===document.getElementById('uploadModal'))closeModal();});

// ============ INIT ============
async function init(){await initAuth();await loadFiles();}
init();
</script>
